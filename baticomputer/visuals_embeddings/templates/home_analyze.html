
{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Baticomputer</title>
    <link rel="stylesheet" href="{% static 'css/baticomputer.css' %}">
</head>
<body>

    <h1>BATICOMPUTER</h1>

    <div class="dashboard">
        <div class="panel">
            <p class="panel-title">// Vector Space Analysis</p>
            <div class="graph-wrapper">
                {{ graph|safe }}
            </div>
        </div>

        <div class="panel">
            <p class="panel-title">// Criminal Data</p>
            <table>
                {% for key, value in criminal_metadata.items %}
                <tr>
                    <td>{{ key }}</td>
                    <td>{{ value }}</td>
                </tr>
                {% endfor %}
            </table>
        </div>

        <div class="panel">
            <p class="panel-title">// Image Upload</p>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="upload-area" id="upload-area">
                    <input 
                        type="file" 
                        name="images" 
                        id="file-input"
                        accept=".png,.jpg,jpeg,.BMP"
                    >
                    <label for="file-input" class="upload-label">
                        <span class="upload-icon">[ + ]</span>
                        <span class="upload-text">DROP IMAGE HERE</span>
                        <span class="upload-sub" id="file-count">No files selected</span>
                    </label>
                </div>
                <button type="submit" class="bat-button">[ ANALYZE ]</button>
            </form>
        </div>

    </div>

</body>
</html>
